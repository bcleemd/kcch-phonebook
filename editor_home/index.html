<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KCCH PhoneBook Editor</title>
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-main: #f8fafc;
            --bg-card: #ffffff;
            --primary: #3b82f6;
            --primary-hover: #2563eb;
            --text-main: #0f172a;
            --text-muted: #64748b;
            --border: #e2e8f0;
            --danger: #ef4444;
            --danger-hover: #dc2626;
            --success: #10b981;
            --success-hover: #059669;
            --shadow: 0 4px 6px -1px rgb(0 0 0 / 0.1), 0 2px 4px -2px rgb(0 0 0 / 0.1);
            --transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: var(--bg-main);
            color: var(--text-main);
            line-height: 1.5;
            padding: 20px;
        }

        .header-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.8);
            backdrop-filter: blur(12px);
            padding: 16px 24px;
            border-radius: 16px;
            border: 1px solid var(--border);
            margin-bottom: 20px;
            box-shadow: var(--shadow);
        }

        .header-title {
            font-size: 1.25rem;
            font-weight: 700;
            color: var(--text-main);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .header-title span {
            font-size: 0.8rem;
            background: #dbeafe;
            color: #1e40af;
            padding: 2px 8px;
            border-radius: 9999px;
            font-weight: 500;
        }

        .action-group {
            display: flex;
            gap: 12px;
        }

        .btn {
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 10px 18px;
            font-size: 0.875rem;
            font-weight: 600;
            border-radius: 10px;
            border: 1px solid transparent;
            cursor: pointer;
            transition: var(--transition);
        }

        .btn-primary {
            background-color: var(--primary);
            color: white;
        }

        .btn-primary:hover {
            background-color: var(--primary-hover);
        }

        .btn-success {
            background-color: var(--success);
            color: white;
        }

        .btn-success:hover {
            background-color: var(--success-hover);
        }

        .btn-secondary {
            background-color: white;
            border-color: var(--border);
            color: var(--text-main);
        }

        .btn-secondary:hover {
            background-color: var(--bg-main);
        }

        .btn-danger {
            background-color: var(--danger);
            color: white;
        }

        .btn-danger:hover {
            background-color: var(--danger-hover);
        }

        .btn-icon {
            padding: 6px;
            border-radius: 6px;
            font-size: 0.75rem;
        }

        .layout-container {
            display: grid;
            grid-template-columns: 320px 1fr;
            gap: 20px;
            height: calc(100vh - 120px);
        }

        /* Sidebar Search & Tools */
        .sidebar {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 20px;
            box-shadow: var(--shadow);
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .search-box {
            position: relative;
        }

        .search-input {
            width: 100%;
            padding: 10px 14px 10px 36px;
            font-size: 0.875rem;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            transition: var(--transition);
        }

        .search-input:focus {
            border-color: var(--primary);
            box-shadow: 0 0 0 3px rgba(59, 130, 246, 0.15);
        }

        .search-icon {
            position: absolute;
            left: 12px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-muted);
            pointer-events: none;
        }

        .shortcuts-panel {
            flex: 1;
            overflow-y: auto;
            border-top: 1px solid var(--border);
            padding-top: 16px;
        }

        .shortcuts-title {
            font-size: 0.75rem;
            font-weight: 700;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.05em;
            margin-bottom: 8px;
        }

        .shortcut-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 0.875rem;
            color: var(--text-main);
            cursor: pointer;
            transition: var(--transition);
        }

        .shortcut-item:hover {
            background-color: var(--bg-main);
            color: var(--primary);
        }

        /* Editor Area */
        .editor-area {
            background: var(--bg-card);
            border-radius: 16px;
            border: 1px solid var(--border);
            padding: 24px;
            box-shadow: var(--shadow);
            overflow-y: auto;
            position: relative;
        }

        /* Tree View styling */
        .tree-root {
            list-style: none;
        }

        .tree-node {
            margin-left: 16px;
            position: relative;
        }

        .tree-node::before {
            content: '';
            position: absolute;
            left: -10px;
            top: 0;
            bottom: 0;
            width: 1px;
            background-color: var(--border);
        }

        .tree-node:last-child::before {
            height: 12px;
        }

        .node-content {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 6px 8px;
            border-radius: 6px;
            cursor: pointer;
            user-select: none;
            transition: var(--transition);
        }

        .node-content:hover {
            background-color: var(--bg-main);
        }

        .node-content.highlight {
            background-color: #fef08a; /* Soft yellow highlight */
        }

        .node-toggle {
            width: 16px;
            height: 16px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            font-size: 0.6rem;
            color: var(--text-muted);
            transition: var(--transition);
        }

        .node-toggle.expanded {
            transform: rotate(90deg);
        }

        .node-icon {
            font-size: 1rem;
        }

        .node-label {
            font-weight: 500;
            font-size: 0.93rem;
        }

        .node-label.leaf {
            color: var(--text-main);
            font-weight: 400;
        }

        .node-value {
            font-size: 0.8rem;
            background: #f1f5f9;
            color: #475569;
            padding: 2px 6px;
            border-radius: 4px;
            font-family: monospace;
        }

        .node-actions {
            margin-left: auto;
            display: none;
            gap: 4px;
        }

        .node-content:hover .node-actions {
            display: inline-flex;
        }

        /* Modal dialog overlay */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(15, 23, 42, 0.4);
            backdrop-filter: blur(4px);
            display: flex;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.2s ease;
        }

        .modal-overlay.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            background: var(--bg-card);
            border-radius: 16px;
            padding: 24px;
            width: 450px;
            max-width: 90%;
            box-shadow: 0 20px 25px -5px rgb(0 0 0 / 0.1), 0 8px 10px -6px rgb(0 0 0 / 0.1);
            transform: scale(0.95);
            transition: transform 0.2s ease;
        }

        .modal-overlay.active .modal-content {
            transform: scale(1);
        }

        .modal-header {
            font-size: 1.15rem;
            font-weight: 700;
            margin-bottom: 16px;
            color: var(--text-main);
        }

        .form-group {
            margin-bottom: 16px;
        }

        .form-label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: var(--text-muted);
            margin-bottom: 6px;
            text-transform: uppercase;
        }

        .form-input {
            width: 100%;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 0.9rem;
            transition: var(--transition);
        }

        .form-input:focus {
            border-color: var(--primary);
        }

        .form-textarea {
            width: 100%;
            height: 100px;
            padding: 10px 12px;
            border-radius: 8px;
            border: 1px solid var(--border);
            outline: none;
            font-size: 0.9rem;
            font-family: monospace;
            resize: none;
            transition: var(--transition);
        }

        .modal-footer {
            display: flex;
            justify-content: flex-end;
            gap: 10px;
            margin-top: 24px;
        }

        /* Toast notification */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 1100;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        .toast {
            background: #1e293b;
            color: white;
            padding: 12px 20px;
            border-radius: 8px;
            box-shadow: var(--shadow);
            font-size: 0.875rem;
            font-weight: 500;
            display: flex;
            align-items: center;
            gap: 10px;
            transform: translateY(20px);
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        .toast.show {
            transform: translateY(0);
            opacity: 1;
        }

        .toast-success {
            border-left: 4px solid var(--success);
        }

        .toast-error {
            border-left: 4px solid var(--danger);
        }

        /* Spinner for loading state */
        .spinner {
            width: 20px;
            height: 20px;
            border: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            border-top-color: white;
            animation: spin 0.8s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <!-- Header bar -->
    <div class="header-bar">
        <div class="header-title">
            KCCH 내선번호부 에디터
            <span>로컬 모드</span>
        </div>
        <div class="action-group">
            <button class="btn btn-secondary" onclick="reloadPhoneBook()">새로고침</button>
            <button class="btn btn-primary" id="btnSave" onclick="saveToServer()">
                저장하기
            </button>
            <button class="btn btn-success" id="btnDeploy" onclick="deployToGitHub()">
                GitHub 배포
            </button>
        </div>
    </div>

    <!-- Main Workspace Layout -->
    <div class="layout-container">
        <!-- Sidebar -->
        <div class="sidebar">
            <div class="search-box">
                <input type="text" id="sidebarSearch" class="search-input" placeholder="이름/장소 검색 후 Enter..." onkeydown="handleSearchKeydown(event)" oninput="if(!this.value.trim()){ triggerSidebarSearch(''); }">
                <div class="search-icon">
                    <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                        <circle cx="11" cy="11" r="8"></circle>
                        <line x1="21" y1="21" x2="16.65" y2="16.65"></line>
                    </svg>
                </div>
            </div>
            <!-- Search Results Panel (Initially Hidden) -->
            <div class="shortcuts-panel" id="searchResultsPanel" style="display: none; border-top: none; padding-top: 0;">
                <div class="shortcuts-title" id="searchResultsTitle">검색 결과 (0)</div>
                <div id="searchResultsList" style="display: flex; flex-direction: column; gap: 8px;">
                    <!-- Search results added dynamically -->
                </div>
            </div>
            <!-- Quick Link Panel (Default) -->
            <div class="shortcuts-panel" id="shortcutsPanel">
                <div class="shortcuts-title">주요 노드로 빠른 이동</div>
                <div id="shortcutsList">
                    <!-- Shortcuts added dynamically -->
                </div>
            </div>
        </div>

        <!-- Tree Editor Workspace -->
        <div class="editor-area">
            <div id="treeContainer">
                <p style="color: var(--text-muted);">데이터를 불러오는 중...</p>
            </div>
        </div>
    </div>

    <!-- Edit Node Modal -->
    <div class="modal-overlay" id="editModal">
        <div class="modal-content">
            <div class="modal-header" id="modalTitle">노드 편집</div>
            <div class="form-group" id="groupNodeName">
                <label class="form-label">이름 (키)</label>
                <input type="text" id="nodeNameInput" class="form-input">
            </div>
            <div class="form-group" id="groupNodeValue" style="display: none;">
                <label class="form-label">전화번호 목록 (한 줄에 하나씩)</label>
                <textarea id="nodeValueInput" class="form-textarea" placeholder="2000&#10;2001"></textarea>
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeModal()">취소</button>
                <button class="btn btn-primary" onclick="submitModal()">확인</button>
            </div>
        </div>
    </div>

    <!-- Commit Message Modal for Deployment -->
    <div class="modal-overlay" id="deployModal">
        <div class="modal-content">
            <div class="modal-header">GitHub 배포 진행</div>
            <div class="form-group">
                <label class="form-label">커밋 메시지</label>
                <input type="text" id="commitMsgInput" class="form-input" value="feat: update phonebook data">
            </div>
            <div class="modal-footer">
                <button class="btn btn-secondary" onclick="closeDeployModal()">취소</button>
                <button class="btn btn-success" id="btnConfirmDeploy" onclick="submitDeployment()">배포 시작</button>
            </div>
        </div>
    </div>

    <!-- Toast Notifications Area -->
    <div class="toast-container" id="toastContainer"></div>

    <script>
        let phoneBookRaw = null;
        let rootKey = "한국원자력의학원";

        // DOM elements
        const treeContainer = document.getElementById('treeContainer');
        const shortcutsList = document.getElementById('shortcutsList');
        const editModal = document.getElementById('editModal');
        const deployModal = document.getElementById('deployModal');
        const nodeNameInput = document.getElementById('nodeNameInput');
        const nodeValueInput = document.getElementById('nodeValueInput');
        const groupNodeValue = document.getElementById('groupNodeValue');
        const modalTitle = document.getElementById('modalTitle');
        const commitMsgInput = document.getElementById('commitMsgInput');

        // Modal context variables
        let currentEditingPath = []; // Path to the currently editing item in raw JSON
        let modalActionType = '';    // 'edit' or 'add_group' or 'add_leaf'

        // Load data on startup
        document.addEventListener('DOMContentLoaded', () => {
            reloadPhoneBook();
        });

        // Toast Helper
        function showToast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const toast = document.createElement('div');
            toast.className = `toast toast-${type}`;
            toast.innerText = message;
            container.appendChild(toast);
            
            // Trigger animation
            setTimeout(() => toast.classList.add('show'), 10);
            
            // Remove after 3s
            setTimeout(() => {
                toast.classList.remove('show');
                setTimeout(() => toast.remove(), 300);
            }, 3000);
        }

        // Fetch PhoneBook raw json from local server
        async function reloadPhoneBook() {
            treeContainer.innerHTML = '<p style="color: var(--text-muted);">전화번호부 데이터를 가져오는 중...</p>';
            try {
                const res = await fetch('/api/phonebook');
                const result = await res.json();
                if (result.success) {
                    phoneBookRaw = result.data;
                    renderWorkspace();
                    showToast('데이터를 성공적으로 불러왔습니다.');
                } else {
                    treeContainer.innerHTML = `<p style="color: var(--danger);">오류 발생: ${result.error}</p>`;
                }
            } catch (err) {
                treeContainer.innerHTML = `<p style="color: var(--danger);">서버 통신 실패: ${err.message}</p>`;
            }
        }

        // Save data to server
        async function saveToServer() {
            const btnSave = document.getElementById('btnSave');
            btnSave.disabled = true;
            const originalText = btnSave.innerHTML;
            btnSave.innerHTML = '<div class="spinner"></div> 저장 중...';

            try {
                const res = await fetch('/api/phonebook', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ data: phoneBookRaw })
                });
                const result = await res.json();
                if (result.success) {
                    showToast('로컬 및 web_home에 저장 완료!');
                } else {
                    showToast(`저장 실패: ${result.error}`, 'error');
                }
            } catch (err) {
                showToast(`저장 에러: ${err.message}`, 'error');
            } finally {
                btnSave.disabled = false;
                btnSave.innerHTML = originalText;
            }
        }

        // Open Deploy Modal
        function deployToGitHub() {
            deployModal.classList.add('active');
            commitMsgInput.focus();
        }

        function closeDeployModal() {
            deployModal.classList.remove('active');
        }

        // Trigger git deployment via server API
        async function submitDeployment() {
            closeDeployModal();
            const btnDeploy = document.getElementById('btnDeploy');
            btnDeploy.disabled = true;
            const originalText = btnDeploy.innerHTML;
            btnDeploy.innerHTML = '<div class="spinner"></div> 배포 중...';

            try {
                const commitMessage = commitMsgInput.value.trim();
                const res = await fetch('/api/deploy', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ commitMessage })
                });
                const result = await res.json();
                if (result.success) {
                    showToast('GitHub 배포(Push)에 성공했습니다!');
                } else {
                    showToast(`배포 실패: ${result.error}`, 'error');
                    console.error(result);
                }
            } catch (err) {
                showToast(`배포 오류: ${err.message}`, 'error');
            } finally {
                btnDeploy.disabled = false;
                btnDeploy.innerHTML = originalText;
            }
        }

        // Render shortcuts and the main interactive tree structure
        function renderWorkspace() {
            shortcutsList.innerHTML = '';
            treeContainer.innerHTML = '';

            if (!phoneBookRaw) return;

            // Generate root tree UI element
            const rootUl = document.createElement('ul');
            rootUl.className = 'tree-root';
            
            // Build the recursive DOM
            buildTree(phoneBookRaw, rootUl, []);
            treeContainer.appendChild(rootUl);

            // Setup shortcut quick links to top level sub-sections under root key (e.g. '주요전화', '임원진', '진료부' 등)
            const mainArr = phoneBookRaw[rootKey];
            if (Array.isArray(mainArr)) {
                mainArr.forEach((item, index) => {
                    if (typeof item === 'object') {
                        Object.keys(item).forEach(key => {
                            if (key === "기준일") return;
                            const div = document.createElement('div');
                            div.className = 'shortcut-item';
                            div.innerText = key;
                            div.onclick = () => scrollToNode([rootKey, index, key]);
                            shortcutsList.appendChild(div);
                        });
                    }
                });
            }
        }

        // Recursive tree builder
        // target: raw JSON object/array
        // parentEl: DOM element to attach children
        // path: array of keys/indexes to locate node in raw JSON
        function buildTree(target, parentEl, path = []) {
            if (target === null || target === undefined) return;

            if (Array.isArray(target)) {
                // If it is a string array, treat it as list of phone numbers (Leaf Node values)
                const isStringArray = target.every(x => typeof x === 'string');
                if (isStringArray && target.length > 0 && typeof target[0] === 'string') {
                    // Do nothing here, leaf elements are rendered by their parent key
                    return;
                }

                // Otherwise render array items
                target.forEach((child, index) => {
                    buildTree(child, parentEl, [...path, index]);
                });
            } else if (typeof target === 'object') {
                Object.keys(target).forEach(key => {
                    const value = target[key];
                    const nodePath = [...path, key];
                    
                    // Identify if leaf node: value is array of strings
                    const isLeaf = Array.isArray(value) && value.every(x => typeof x === 'string');

                    const li = document.createElement('li');
                    li.className = 'tree-node';
                    li.id = 'node-' + cleanPathId(nodePath);

                    const content = document.createElement('div');
                    content.className = 'node-content';

                    const toggle = document.createElement('div');
                    toggle.className = 'node-toggle';
                    
                    const icon = document.createElement('span');
                    icon.className = 'node-icon';

                    const label = document.createElement('span');
                    label.className = `node-label ${isLeaf ? 'leaf' : 'branch'}`;
                    label.innerText = key;

                    content.appendChild(toggle);
                    content.appendChild(icon);
                    content.appendChild(label);

                    let childrenUl = null;

                    if (isLeaf) {
                        toggle.innerHTML = '•';
                        icon.innerHTML = '📞';
                        
                        const valSpan = document.createElement('span');
                        valSpan.className = 'node-value';
                        valSpan.innerText = value.join(' / ');
                        content.appendChild(valSpan);
                    } else {
                        toggle.innerHTML = '▶';
                        icon.innerHTML = '📁';
                        
                        childrenUl = document.createElement('ul');
                        childrenUl.style.display = 'none'; // collapse by default

                        content.onclick = (e) => {
                            if (e.target.closest('.node-actions')) return; // ignore clicks on action buttons
                            const isCollapsed = childrenUl.style.display === 'none';
                            childrenUl.style.display = isCollapsed ? 'block' : 'none';
                            toggle.innerHTML = isCollapsed ? '▼' : '▶';
                        };
                    }

                    // Append Edit/Add/Delete actions
                    const actions = document.createElement('div');
                    actions.className = 'node-actions';

                    const btnEdit = document.createElement('button');
                    btnEdit.className = 'btn btn-secondary btn-icon';
                    btnEdit.innerHTML = '✏️';
                    btnEdit.title = '이름/번호 수정';
                    btnEdit.onclick = (e) => {
                        e.stopPropagation();
                        openEditModal(nodePath, key, isLeaf ? value : null);
                    };
                    actions.appendChild(btnEdit);

                    if (!isLeaf) {
                        // Add sub group
                        const btnAddGroup = document.createElement('button');
                        btnAddGroup.className = 'btn btn-secondary btn-icon';
                        btnAddGroup.innerHTML = '➕📁';
                        btnAddGroup.title = '하위 그룹 추가';
                        btnAddGroup.onclick = (e) => {
                            e.stopPropagation();
                            openAddModal(nodePath, 'group');
                        };
                        actions.appendChild(btnAddGroup);

                        // Add leaf contact
                        const btnAddContact = document.createElement('button');
                        btnAddContact.className = 'btn btn-secondary btn-icon';
                        btnAddContact.innerHTML = '➕📞';
                        btnAddContact.title = '연락처 추가';
                        btnAddContact.onclick = (e) => {
                            e.stopPropagation();
                            openAddModal(nodePath, 'contact');
                        };
                        actions.appendChild(btnAddContact);
                    }

                    // Delete node
                    const btnDel = document.createElement('button');
                    btnDel.className = 'btn btn-danger btn-icon';
                    btnDel.innerHTML = '🗑️';
                    btnDel.title = '삭제';
                    btnDel.onclick = (e) => {
                        e.stopPropagation();
                        if (confirm(`'${key}' 노드를 정말로 삭제하시겠습니까?`)) {
                            deleteNode(nodePath);
                        }
                    };
                    actions.appendChild(btnDel);

                    content.appendChild(actions);
                    li.appendChild(content);

                    if (childrenUl) {
                        li.appendChild(childrenUl);
                        // Recursively build children
                        buildTree(value, childrenUl, nodePath);
                    }

                    parentEl.appendChild(li);
                });
            }
        }

        // Clean path to form a valid HTML id selector
        function cleanPathId(path) {
            return path.join('-').replace(/[^a-zA-Z0-9가-힣-]/g, '');
        }

        // Scroll and highlight a node
        function scrollToNode(path) {
            const cleanId = 'node-' + cleanPathId(path);
            const el = document.getElementById(cleanId);
            if (el) {
                // Expand all parent nodes up to this node
                let parent = el.parentElement;
                while (parent && parent.className !== 'tree-root') {
                    if (parent.tagName === 'UL') {
                        parent.style.display = 'block';
                        const toggleBtn = parent.previousElementSibling?.querySelector('.node-toggle');
                        if (toggleBtn && toggleBtn.innerHTML === '▶') {
                            toggleBtn.innerHTML = '▼';
                        }
                    }
                    parent = parent.parentElement;
                }

                // Highlight and scroll
                const nodeContent = el.querySelector('.node-content');
                nodeContent.classList.add('highlight');
                el.scrollIntoView({ behavior: 'smooth', block: 'center' });

                setTimeout(() => {
                    nodeContent.classList.remove('highlight');
                }, 2000);
            }
        }

        // Search logic
        function handleSearch(term) {
            const normalized = term.toLowerCase().trim();
            
            // Remove previous highlights
            const highlighted = document.querySelectorAll('.node-content.highlight');
            highlighted.forEach(el => el.classList.remove('highlight'));
            
            if (!normalized) return;

            // Simple traversal of DOM nodes
            const labelElements = document.querySelectorAll('.node-label');
            let firstFound = null;

            labelElements.forEach(el => {
                const text = el.innerText.toLowerCase();
                const nodeContent = el.parentElement;
                const valueEl = nodeContent.querySelector('.node-value');
                const valText = valueEl ? valueEl.innerText.toLowerCase() : '';

                if (text.includes(normalized) || valText.includes(normalized)) {
                    nodeContent.classList.add('highlight');
                    if (!firstFound) {
                        firstFound = el.closest('.tree-node');
                    }
                    
                    // Auto-expand hierarchy
                    let parent = nodeContent.parentElement.parentElement;
                    while (parent && parent.className !== 'tree-root') {
                        if (parent.tagName === 'UL') {
                            parent.style.display = 'block';
                            const toggleBtn = parent.previousElementSibling?.querySelector('.node-toggle');
                            if (toggleBtn && toggleBtn.innerHTML === '▶') {
                                toggleBtn.innerHTML = '▼';
                            }
                        }
                        parent = parent.parentElement;
                    }
                }
            });

            if (firstFound) {
                firstFound.scrollIntoView({ behavior: 'smooth', block: 'center' });
            }
        }

        // Enter key event handler for sidebar search
        function handleSearchKeydown(event) {
            if (event.key === 'Enter') {
                const query = event.target.value;
                triggerSidebarSearch(query);
            }
        }

        // Sidebar search execution
        function triggerSidebarSearch(query) {
            const searchResultsPanel = document.getElementById('searchResultsPanel');
            const searchResultsList = document.getElementById('searchResultsList');
            const searchResultsTitle = document.getElementById('searchResultsTitle');
            const shortcutsPanel = document.getElementById('shortcutsPanel');

            const normalized = query.trim();
            if (!normalized) {
                // If search query is empty, hide results panel and restore shortcuts panel
                searchResultsPanel.style.display = 'none';
                shortcutsPanel.style.display = 'block';
                handleSearch(''); // Reset highlights
                return;
            }

            // Search raw JSON tree data
            const matches = searchTreeData(phoneBookRaw, normalized, []);

            // Render search results UI
            searchResultsTitle.innerText = `검색 결과 (${matches.length})`;
            searchResultsList.innerHTML = '';

            if (matches.length === 0) {
                searchResultsList.innerHTML = '<div style="font-size: 0.85rem; color: var(--text-muted); padding: 10px;">검색 결과가 없습니다.</div>';
            } else {
                matches.forEach(item => {
                    const div = document.createElement('div');
                    div.className = 'shortcut-item';
                    div.style.flexDirection = 'column';
                    div.style.alignItems = 'flex-start';
                    div.style.gap = '2px';
                    div.style.padding = '8px 12px';

                    const nameSpan = document.createElement('span');
                    nameSpan.style.fontWeight = '600';
                    nameSpan.style.whiteSpace = 'normal';
                    nameSpan.innerText = item.name;

                    const pathSpan = document.createElement('span');
                    pathSpan.style.fontSize = '0.75rem';
                    pathSpan.style.color = 'var(--text-muted)';
                    pathSpan.style.whiteSpace = 'normal';
                    pathSpan.innerText = getPathLabel(item.path);

                    div.appendChild(nameSpan);
                    div.appendChild(pathSpan);

                    if (item.value && item.value !== '📁 그룹') {
                        const valSpan = document.createElement('span');
                        valSpan.style.fontSize = '0.75rem';
                        valSpan.style.fontFamily = 'monospace';
                        valSpan.style.background = '#f1f5f9';
                        valSpan.style.padding = '1px 4px';
                        valSpan.style.borderRadius = '3px';
                        valSpan.style.marginTop = '2px';
                        valSpan.style.wordBreak = 'break-all';
                        valSpan.innerText = item.value;
                        div.appendChild(valSpan);
                    }

                    div.onclick = () => {
                        scrollToNode(item.path);
                    };

                    searchResultsList.appendChild(div);
                });
            }

            // Panel swap
            shortcutsPanel.style.display = 'none';
            searchResultsPanel.style.display = 'block';

            // Trigger workspace tree expansion and highlighting
            handleSearch(normalized);
        }

        // Recursively search tree data for keys or values matching the query term
        function searchTreeData(data, term, currentPath = []) {
            let results = [];
            const normalized = term.toLowerCase().trim();

            if (data === null || data === undefined) return results;

            if (Array.isArray(data)) {
                const isStringArray = data.every(x => typeof x === 'string');
                if (isStringArray && data.length > 0 && typeof data[0] === 'string') {
                    const matches = data.some(num => num.toLowerCase().includes(normalized));
                    if (matches && currentPath.length > 0) {
                        results.push({
                            path: currentPath,
                            name: currentPath[currentPath.length - 1],
                            value: data.join(' / ')
                        });
                    }
                    return results;
                }

                data.forEach((child, index) => {
                    results = results.concat(searchTreeData(child, term, [...currentPath, index]));
                });
            } else if (typeof data === 'object') {
                Object.keys(data).forEach(key => {
                    const val = data[key];
                    const nodePath = [...currentPath, key];
                    
                    const isLeaf = Array.isArray(val) && val.every(x => typeof x === 'string');
                    if (key.toLowerCase().includes(normalized)) {
                        results.push({
                            path: nodePath,
                            name: key,
                            value: isLeaf ? val.join(' / ') : '📁 그룹'
                        });
                    }

                    if (!isLeaf) {
                        results = results.concat(searchTreeData(val, term, nodePath));
                    }
                });
            }
            return results;
        }

        // Format hierarchical path breadcrumbs
        function getPathLabel(path) {
            return path.filter(x => typeof x === 'string' && x !== '한국원자력의학원').join(' ➔ ');
        }


        // Resolve reference in raw JSON from path array
        function resolveRef(path) {
            let ref = phoneBookRaw;
            for (let i = 0; i < path.length; i++) {
                ref = ref[path[i]];
            }
            return ref;
        }

        // Modal Action Trigger: Edit Node
        function openEditModal(path, label, valueList) {
            currentEditingPath = path;
            modalActionType = 'edit';
            modalTitle.innerText = `노드 편집: ${label}`;
            
            nodeNameInput.value = label;
            
            if (valueList) {
                // Leaf Node
                groupNodeValue.style.display = 'block';
                nodeValueInput.value = valueList.join('\n');
            } else {
                // Branch Node
                groupNodeValue.style.display = 'none';
            }

            editModal.classList.add('active');
            nodeNameInput.focus();
        }

        // Modal Action Trigger: Add Node
        function openAddModal(parentPath, type) {
            currentEditingPath = parentPath;
            modalActionType = type === 'group' ? 'add_group' : 'add_leaf';
            modalTitle.innerText = type === 'group' ? '하위 그룹 추가' : '새 연락처 추가';
            
            nodeNameInput.value = '';
            nodeValueInput.value = '';
            
            if (type === 'contact') {
                groupNodeValue.style.display = 'block';
            } else {
                groupNodeValue.style.display = 'none';
            }

            editModal.classList.add('active');
            nodeNameInput.focus();
        }

        function closeModal() {
            editModal.classList.remove('active');
        }

        // Confirm modal action and apply to local JSON state
        function submitModal() {
            const newName = nodeNameInput.value.trim();
            if (!newName) {
                alert('이름을 입력해주세요.');
                return;
            }

            if (modalActionType === 'edit') {
                performEdit(newName);
            } else if (modalActionType === 'add_group') {
                performAdd(newName, {}, false);
            } else if (modalActionType === 'add_leaf') {
                const valLines = nodeValueInput.value.split('\n')
                    .map(x => x.trim())
                    .filter(x => x !== '');
                performAdd(newName, valLines, true);
            }

            closeModal();
            renderWorkspace();
            
            // Scroll to the newly edited/added element
            let targetScrollPath = [...currentEditingPath];
            if (modalActionType.startsWith('add_')) {
                // For additions, scroll to parent or construct exact new path if possible
                if (Array.isArray(resolveRef(currentEditingPath))) {
                    const parentData = resolveRef(currentEditingPath);
                    targetScrollPath.push(parentData.length - 1);
                    targetScrollPath.push(newName);
                } else {
                    targetScrollPath.push(newName);
                }
            } else {
                // For edits, if key changed, the path has changed
                targetScrollPath[targetScrollPath.length - 1] = newName;
            }
            setTimeout(() => scrollToNode(targetScrollPath), 100);
        }

        // Perform rename or value update on current path
        function performEdit(newName) {
            const path = currentEditingPath;
            const oldKey = path[path.length - 1];
            
            // Locate parent object
            const parentPath = path.slice(0, -1);
            const parent = resolveRef(parentPath);

            if (Array.isArray(parent)) {
                // Parent is array, target is index or object
                // If it is array of objects, oldKey might be index.
                // Let's resolve the exact parent and rename the key.
            } else if (typeof parent === 'object') {
                const originalVal = parent[oldKey];
                
                // If leaf and numbers changed
                if (groupNodeValue.style.display === 'block') {
                    const valLines = nodeValueInput.value.split('\n')
                        .map(x => x.trim())
                        .filter(x => x !== '');
                    
                    if (oldKey !== newName) {
                        delete parent[oldKey];
                        parent[newName] = valLines;
                    } else {
                        parent[oldKey] = valLines;
                    }
                } else {
                    // It is a category key change
                    if (oldKey !== newName) {
                        delete parent[oldKey];
                        parent[newName] = originalVal;
                    }
                }
            }
        }

        // Perform child insertion on parent node
        function performAdd(name, value, isLeaf) {
            const parent = resolveRef(currentEditingPath);

            if (Array.isArray(parent)) {
                // If parent is array, we push a new object wrapping the item
                const newItem = {};
                newItem[name] = value;
                parent.push(newItem);
            } else if (typeof parent === 'object') {
                parent[name] = value;
            }
        }

        // Delete node by path
        function deleteNode(path) {
            const targetKey = path[path.length - 1];
            const parentPath = path.slice(0, -1);
            const parent = resolveRef(parentPath);

            if (Array.isArray(parent)) {
                // If parent is array (like the array under a department), we delete by index
                // targetKey is the index here.
                const index = parseInt(targetKey, 10);
                if (!isNaN(index)) {
                    parent.splice(index, 1);
                }
            } else if (typeof parent === 'object') {
                delete parent[targetKey];
            }

            renderWorkspace();
            showToast('노드가 삭제되었습니다.');
        }
    </script>
</body>
